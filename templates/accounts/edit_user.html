{% extends 'base.html' %}

{% block title %}Editar Usuário{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    <i class="fas fa-user-edit"></i> Editar Usuário: {{ edit_user.get_full_name }}
                </h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Nome</label>
                            <input type="text" name="first_name" class="form-control" value="{{ edit_user.first_name }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Sobrenome</label>
                            <input type="text" name="last_name" class="form-control" value="{{ edit_user.last_name }}" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ edit_user.email }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Telefone</label>
                        <input type="text" name="phone" class="form-control" value="{{ edit_user.phone }}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tipo de Usuário</label>
                        <select name="user_type" class="form-select">
                            <option value="citizen" {% if edit_user.user_type == 'citizen' %}selected{% endif %}>Cidadão</option>
                            <option value="analyst" {% if edit_user.user_type == 'analyst' %}selected{% endif %}>Analista</option>
                            <option value="manager" {% if edit_user.user_type == 'manager' %}selected{% endif %}>Gestor</option>
                            {% if request.user.is_superuser %}
                            <option value="admin" {% if edit_user.user_type == 'admin' %}selected{% endif %}>Administrador</option>
                            {% endif %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Departamento</label>
                        <input type="text" name="department" class="form-control" value="{{ edit_user.department }}">
                    </div>
                    
                    <div class="form-check mb-3">
                        <input type="checkbox" name="is_active" class="form-check-input" id="is_active" {% if edit_user.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">
                            Usuário ativo
                        </label>
                    </div>
                    
                    {% if request.user.is_superuser %}
                    <div class="form-check mb-3">
                        <input type="checkbox" name="is_staff" class="form-check-input" id="is_staff" {% if edit_user.is_staff %}checked{% endif %}>
                        <label class="form-check-label" for="is_staff">
                            Acesso ao admin (staff)
                        </label>
                    </div>
                    {% endif %}
                    
                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save"></i> Salvar Alterações
                        </button>
                        <a href="{% url 'accounts:user_list' %}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
