{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h3 class="mb-0">
                        <i class="fas fa-sign-in-alt"></i> Acessar Sistema
                    </h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="form-group mb-3">
                            <label for="id_username">
                                <i class="fas fa-user"></i> Usuário ou E-mail
                            </label>
                            {{ form.username }}
                        </div>
                        
                        <div class="form-group mb-3">
                            <label for="id_password">
                                <i class="fas fa-lock"></i> Senha
                            </label>
                            {{ form.password }}
                        </div>
                        
                        <div class="form-group text-center">
                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                <i class="fas fa-sign-in-alt"></i> Entrar
                            </button>
                        </div>
                    </form>
                    
                    <hr>
                    
                    <div class="text-center">
                        <p class="mb-2">Ainda não tem cadastro?</p>
                        <a href="{% url 'accounts:register' %}" class="btn btn-success">
                            <i class="fas fa-user-plus"></i> Cadastre-se como Cidadão
                        </a>
                    </div>
                </div>
            </div>
            
            <div class="card mt-3 shadow">
                <div class="card-body text-center text-muted">
                    <small>
                        <i class="fas fa-shield-alt"></i> Sistema seguro e confiável<br>
                        Seus dados estão protegidos
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
